name: messaging_app
description: Messaging app rebuilt in Flutter
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Socket.IO
  socket_io_client: ^2.0.3+1

  # State management
  flutter_riverpod: ^2.5.1

  # Local database
  sqflite: ^2.3.3
  path: ^1.9.0

  # HTTP
  dio: ^5.4.3+1

  # Image / media
  cached_network_image: ^3.3.1
  image_picker: ^1.1.2
  file_picker: ^8.0.3
  photo_view: ^0.14.0
  video_player: ^2.8.6

  # Notifications
  firebase_core: ^3.3.0
  firebase_messaging: ^15.1.0
  flutter_local_notifications: ^17.2.2

  # WebRTC
  flutter_webrtc: ^0.10.0

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3

  # Camera
  camera: ^0.11.0+2

  # Emoji
  emoji_picker_flutter: ^2.2.0

  # Utilities
  shared_preferences: ^2.2.3
  intl: ^0.19.0
  uuid: ^4.4.0
  permission_handler: ^11.3.1
  device_info_plus: ^10.1.0
  connectivity_plus: ^6.0.3
  timeago: ^3.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
